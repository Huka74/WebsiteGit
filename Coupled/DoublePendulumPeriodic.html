<script>
    function toggleDetails(trigger) {
        const arrow = trigger.querySelector('.arrow');
        const detailsBox = trigger.nextElementSibling;
        const textSpan = trigger.querySelector('span:last-child');
        
        arrow.classList.toggle('expanded');
        detailsBox.classList.toggle('expanded');
        
        if (detailsBox.classList.contains('expanded')) {
            textSpan.textContent = 'Hide detailed steps';
        } else {
            textSpan.textContent = 'Show detailed steps';
        }
    }
</script>
